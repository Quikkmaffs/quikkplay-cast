<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>QuikkPlay Receiver</title>
    <link rel="stylesheet" href="./receiver.css" />
    <script
      defer
      src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"
    ></script>
    <script defer src="./receiver.js"></script>
  </head>
  <body>
    <cast-media-player></cast-media-player>
    <div class="receiver-center" id="receiver-center">
      <div class="receiver-panel">
        <div class="receiver-kicker" id="receiver-kicker">Receiver Ready</div>
        <h1 class="receiver-title" id="receiver-title">Waiting for playback</h1>
        <p class="receiver-detail" id="receiver-detail">
          Open QuikkPlay on your phone, choose this Cast device, and start a video, audio track, or image.
        </p>
        <div class="receiver-spinner" id="receiver-spinner" aria-hidden="true"></div>
      </div>
    </div>
    <div class="receiver-badge">
      <span class="receiver-badge__name">QuikkPlay</span>
      <span class="receiver-badge__status" id="receiver-status">Ready</span>
    </div>
  </body>
</html>
